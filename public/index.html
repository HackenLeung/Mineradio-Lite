<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <!--
    Mineradio Lite — 静态大封面播放器 MVP
    CSP：无内联脚本/样式；connect/img 限同源（封面/音频走本地代理）。
    meta CSP 不支持 frame-ancestors。
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; font-src 'self'; base-uri 'none'; form-action 'none'; object-src 'none'" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mineradio Lite</title>
  <script src="/js/perf-probe.js"></script>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/player.css" />
</head>
<body>
  <div id="album-bg" aria-hidden="true">
    <div id="bg-a" class="bg-img"></div>
    <div id="bg-b" class="bg-img"></div>
    <div class="bg-veil"></div>
  </div>

  <div id="app">
    <header id="titlebar" class="titlebar">
      <div class="brand">Mineradio <span>Lite</span></div>
      <form id="search-form" class="search-wrap" autocomplete="off">
        <input id="search-input" class="field" type="search" placeholder="搜索歌曲 / 歌手" enterkeyhint="search" />
      </form>
      <div class="tabs" title="搜索源">
        <button type="button" data-provider="netease" class="active">网易云</button>
        <button type="button" data-provider="kugou">酷狗</button>
      </div>
      <div class="win-controls">
        <button type="button" id="btn-min" title="最小化">─</button>
        <button type="button" id="btn-max" title="最大化">□</button>
        <button type="button" id="btn-close" class="close" title="关闭">×</button>
      </div>
    </header>

    <div class="main">
      <section class="stage">
        <div class="cover-stage" id="cover-stage">
          <div id="cover-placeholder" class="placeholder">大封面</div>
          <img id="cover-a" alt="" draggable="false" />
          <img id="cover-b" alt="" draggable="false" />
        </div>
        <div class="now-meta">
          <h1 id="now-title" class="title">尚未播放</h1>
          <p id="now-sub" class="sub">搜索并点选歌曲</p>
          <div class="badges">
            <span id="badge-trial" class="badge trial" hidden>试听</span>
            <span id="badge-quality" class="badge quality" hidden></span>
          </div>
          <p id="home-hint" class="sub" style="margin-top:14px;font-size:12px;color:var(--fg-mute)"></p>
        </div>
      </section>

      <aside id="side" class="side">
        <div class="side-head">
          <h2>搜索结果</h2>
          <span id="side-status" style="font-size:12px;color:var(--fg-mute)"></span>
        </div>
        <div id="search-results" class="side-body song-list"></div>
        <div class="side-head" style="border-top:1px solid var(--line)">
          <h2>播放队列</h2>
          <span id="app-version-label" style="font-size:11px;color:var(--fg-mute)"></span>
        </div>
        <div id="queue-list" class="side-body song-list" style="flex:0.9"></div>
      </aside>
    </div>

    <footer class="bottombar">
      <div class="transport-meta">
        <img id="mini-cover" class="mini-cover" alt="" />
        <div class="texts">
          <div id="mini-title" class="t">未播放</div>
          <div id="mini-artist" class="a"></div>
        </div>
      </div>

      <div class="transport-center">
        <div class="transport-btns">
          <button type="button" id="btn-mode" class="icon-btn" title="播放模式">➡</button>
          <button type="button" id="btn-prev" class="icon-btn" title="上一首">⏮</button>
          <button type="button" id="btn-play" class="icon-btn primary" title="播放/暂停">▶</button>
          <button type="button" id="btn-next" class="icon-btn" title="下一首">⏭</button>
        </div>
        <div class="progress-row">
          <span id="time-cur" class="time">0:00</span>
          <input id="seek" class="slider" type="range" min="0" max="0" value="0" step="0.1" />
          <span id="time-dur" class="time">0:00</span>
        </div>
      </div>

      <div class="transport-extra">
        <button type="button" id="btn-mute" class="icon-btn" title="静音">🔊</button>
        <div class="volume-wrap">
          <input id="volume" class="slider" type="range" min="0" max="1" step="0.01" value="0.85" />
        </div>
        <div class="quality-menu">
          <button type="button" id="btn-quality" class="chip" title="音质">音质</button>
          <div id="quality-pop" class="quality-pop"></div>
        </div>
      </div>
    </footer>
  </div>

  <div id="toast-host" class="toast-host"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <!--
    Mineradio Lite — 阶段 0 占位页。
    安全基线（见 docs/prohibited.md §6 / docs/implementation-plan.md 阶段 0 任务 6）：
    server.js 的 serveStatic 不发 CSP 响应头，故用 <meta http-equiv> 声明 CSP。
    严格策略：default-src 'none'；脚本/样式只允许同源外部文件（无内联脚本/样式，
    从占位阶段起即遵守，不留「先不安全后整改」的口子）；connect/img/font 限同源。
  -->
  <!-- meta CSP 不支持 frame-ancestors（Chromium 会警告并忽略），故不写该指令。 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; font-src 'self'; base-uri 'none'; form-action 'none'; object-src 'none'" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mineradio Lite — 阶段 0</title>
  <!-- perf-probe 必须最早注入：置于 head 首个脚本，早于任何应用代码。 -->
  <script src="/js/perf-probe.js"></script>
  <link rel="stylesheet" href="/css/placeholder.css" />
</head>
<body class="ph-body">
  <main class="ph-shell">
    <h1 class="ph-title">Mineradio Lite</h1>
    <p class="ph-sub">阶段 0 — 地基占位页（非业务功能）</p>

    <section class="ph-card">
      <h2 class="ph-card-title">应用版本 <code>/api/app/version</code></h2>
      <dl class="ph-kv" id="version-kv"><dd class="ph-loading">加载中…</dd></dl>
    </section>

    <section class="ph-card">
      <h2 class="ph-card-title">发现首页 <code>/api/discover/home</code></h2>
      <div class="ph-discover" id="discover-box"><span class="ph-loading">加载中…</span></div>
    </section>

    <section class="ph-card">
      <h2 class="ph-card-title">性能探针 <code>window.__perf</code></h2>
      <pre class="ph-perf" id="perf-box">等待探针快照…</pre>
    </section>
  </main>
  <!-- 占位逻辑外置（CSP 禁内联脚本）。外部数据一律 textContent，禁止 innerHTML 拼接。 -->
  <script src="/js/placeholder.js" defer></script>
</body>
</html>

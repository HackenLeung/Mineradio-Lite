<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: blob: http://127.0.0.1:*; connect-src 'none'; base-uri 'none'; form-action 'none'; object-src 'none'" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mineradio Cube Remote</title>
  <link rel="stylesheet" href="/css/cube-remote.css" />
</head>
<body>
  <div id="cube" class="cube" aria-label="魔方遥控">
    <div class="meta" id="meta" hidden>
      <div class="title" id="title">未播放</div>
      <div class="sub" id="sub"></div>
    </div>

    <div class="row transport">
      <button type="button" class="icon-btn" id="btn-prev" title="上一首" aria-label="上一首">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6Z"/></svg>
      </button>
      <button type="button" class="play-btn" id="btn-play" title="播放/暂停" aria-label="播放/暂停">
        <img id="cover" alt="" draggable="false" />
        <span class="play-veil"></span>
        <svg class="symbol play" viewBox="0 0 24 24"><path d="M8 5v14l11-7Z"/></svg>
        <svg class="symbol pause" viewBox="0 0 24 24"><path d="M6.5 5h4v14h-4zm7 0h4v14h-4z"/></svg>
      </button>
      <button type="button" class="icon-btn" id="btn-next" title="下一首" aria-label="下一首">
        <svg viewBox="0 0 24 24"><path d="m6 18 8.5-6L6 6zm10-12h2v12h-2z"/></svg>
      </button>
    </div>

    <div class="row tools">
      <div class="volume-wrap">
        <button type="button" class="icon-btn" id="btn-volume" title="音量" aria-label="音量">
          <svg class="vol-on" viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4Zm4 4.5a4 4 0 0 1 0 5"/></svg>
          <svg class="vol-off" viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4Zm4 5 6-6m-6 0 6 6"/></svg>
        </button>
        <div class="volume-pop" id="volume-pop">
          <input id="volume" class="volume-slider" type="range" min="0" max="1" step="0.01" value="0.85" orient="vertical" />
          <span id="volume-label">85%</span>
        </div>
      </div>
      <button type="button" class="icon-btn" id="btn-open" title="隐藏主程序" aria-label="隐藏主程序">
        <svg class="main-show" viewBox="0 0 24 24"><path d="M14 3h7v7h-2V6.4l-9.3 9.3-1.4-1.4L17.6 5H14V3zM5 5h6v2H7v10h10v-4h2v6H5V5z"/></svg>
        <svg class="main-hide" viewBox="0 0 24 24"><path d="M5 5h14v14H5V5Zm2 2v10h10V7H7Zm2 4h6v2H9v-2Z"/></svg>
      </button>
      <button type="button" class="icon-btn" id="btn-lyrics" title="桌面歌词" aria-label="桌面歌词">
        <svg viewBox="0 0 24 24"><path d="M12 14a3.5 3.5 0 0 0 3.5-3.5V6a3.5 3.5 0 1 0-7 0v4.5A3.5 3.5 0 0 0 12 14Zm-7-3.5h2a5 5 0 0 0 10 0h2a7 7 0 0 1-6 6.9V20h3v2H8v-2h3v-2.6A7 7 0 0 1 5 10.5Z"/></svg>
      </button>
      <button type="button" class="icon-btn" id="btn-info" title="固定展开" aria-label="固定展开" aria-pressed="false">
        <svg viewBox="0 0 24 24"><path d="M6 10a2 2 0 1 1 0 4 2 2 0 0 1 0-4Zm6 0a2 2 0 1 1 0 4 2 2 0 0 1 0-4Zm6 0a2 2 0 1 1 0 4 2 2 0 0 1 0-4Z"/></svg>
      </button>
    </div>
  </div>
  <script src="/js/cube-remote.js"></script>
</body>
</html>
